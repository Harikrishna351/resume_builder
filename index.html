<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Builder - Debug Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

        body {
            background: #f0f0f0;
            height: 100vh;
            overflow: hidden;
        }

        /* Welcome Screen */
        #welcomeScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        .welcome-box {
            background: rgba(255,255,255,0.2);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
        }

        .welcome-box h1 { margin-bottom: 20px; font-size: 32px; }
        .welcome-box p { margin-bottom: 30px; font-size: 18px; opacity: 0.9; }

        #startBtn {
            padding: 15px 40px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #startBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        #startBtn:active { transform: translateY(0); }

        /* Main App - Hidden by default */
        #mainApp {
            display: none;
            height: 100vh;
            width: 100%;
        }

        #mainApp.visible {
            display: flex;
        }

        .left-panel {
            width: 40%;
            background: white;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #667eea;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-msg {
            background: white;
            border: 1px solid #e0e0e0;
            align-self: flex-start;
        }

        .user-msg {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        #msgInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        #msgInput:focus { border-color: #667eea; }

        #sendBtn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .right-panel {
            flex: 1;
            background: #e9ecef;
            padding: 20px;
            overflow-y: auto;
        }

        .resume-preview {
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            font-family: 'Times New Roman', serif;
            font-size: 11pt;
            line-height: 1.4;
        }

        .suggestion-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
        }

        .suggestion-btn:hover { background: #bbdefb; }

        .error-box {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff5252;
            color: white;
            padding: 15px;
            border-radius: 8px;
            display: none;
            z-index: 10000;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <!-- Error Display -->
    <div id="errorBox" class="error-box"></div>

    <!-- Welcome Screen -->
    <div id="welcomeScreen">
        <div class="welcome-box">
            <h1>📝 Resume Builder</h1>
            <p>Create an ATS-optimized resume with smart suggestions</p>
            <button id="startBtn" onclick="startApp()">Start Building →</button>
            <p style="margin-top: 20px; font-size: 14px; opacity: 0.8;">
                If button doesn't work, check browser console (F12)
            </p>
        </div>
    </div>

    <!-- Main Application -->
    <div id="mainApp">
        <div class="left-panel">
            <div class="header">
                <h2>💬 Chat Assistant</h2>
                <button onclick="goBack()" id="backButton" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer;">← Back</button>
            </div>

            <div class="chat-area" id="chatBox">
                <!-- Messages appear here -->
            </div>

            <div class="input-area">
                <textarea id="msgInput" rows="1" placeholder="Type here..." style="resize: none; overflow: hidden;"></textarea>
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div class="right-panel">
            <div style="background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: flex; align-items: center; gap: 15px;">
                <div style="width: 60px; height: 60px; background: conic-gradient(#4caf50 calc(var(--score, 0) * 1%), #e0e0e0 0); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative;">
                    <div style="position: absolute; width: 48px; height: 48px; background: white; border-radius: 50%;"></div>
                    <span id="scoreDisplay" style="position: relative; z-index: 1; font-weight: bold;">0</span>
                </div>
                <div>
                    <h3 style="margin: 0;">ATS Score</h3>
                    <p style="margin: 0; color: #666; font-size: 14px;">Complete your resume</p>
                </div>
            </div>

            <div class="resume-preview" id="resumeView">
                <div style="text-align: center; color: #999; padding-top: 100px;">
                    Your resume will appear here
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentStep = 0;
        let resumeData = {
            name: '', title: '', email: '', phone: '', location: '',
            summary: '', experience: [], education: [], skills: []
        };
        let currentExp = null;

        // Debug function
        function showError(msg) {
            console.error(msg);
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        // Start function - called directly by button
        function startApp() {
            try {
                console.log("Starting app...");

                // Hide welcome
                const welcome = document.getElementById('welcomeScreen');
                const mainApp = document.getElementById('mainApp');

                if (!welcome || !mainApp) {
                    showError("Elements not found!");
                    return;
                }

                welcome.style.display = 'none';
                mainApp.classList.add('visible');

                console.log("App started successfully");

                // Initialize first step
                showStep(0);

                // Setup textarea auto-resize
                const textarea = document.getElementById('msgInput');
                textarea.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });

            } catch (e) {
                showError("Error: " + e.message);
                console.error(e);
            }
        }

        // Step definitions
        const steps = [
            {
                question: "What job title are you targeting? (e.g., Software Engineer)",
                suggestions: ["Software Engineer", "Marketing Manager", "Product Manager", "Sales Representative"],
                field: "targetRole"
            },
            {
                question: "What's your full name?",
                field: "name"
            },
            {
                question: "Your email address?",
                field: "email"
            },
            {
                question: "Phone number?",
                field: "phone"
            },
            {
                question: "City and State?",
                field: "location"
            },
            {
                question: "Write a professional summary (2-3 sentences). Click a template below or type your own:",
                isParagraph: true,
                suggestions: [
                    "Results-driven professional with 5+ years of experience delivering exceptional results in fast-paced environments.",
                    "Detail-oriented specialist with strong analytical skills and proven track record of managing complex projects."
                ],
                field: "summary"
            },
            {
                question: "Most recent job title?",
                field: "exp_title",
                onComplete: function(val) { currentExp = {title: val, company: "", date: "", desc: ""}; }
            },
            {
                question: "Company name?",
                onComplete: function(val) { currentExp.company = val; }
            },
            {
                question: "Dates? (e.g., Jan 2020 - Present)",
                onComplete: function(val) { currentExp.date = val; }
            },
            {
                question: "Job description - describe your achievements:",
                isParagraph: true,
                suggestions: ["Led team of 5 developers to deliver project 2 weeks early", "Increased sales revenue by 30% through strategic initiatives"],
                onComplete: function(val) {
                    currentExp.desc = val;
                    resumeData.experience.push({...currentExp});
                }
            },
            {
                question: "Add another job?",
                options: ["Yes, add another", "No, continue to education"],
                handler: function(val) {
                    if (val.includes("Yes")) {
                        currentStep = 5; // Go back to job title
                        showStep(currentStep);
                        return false;
                    }
                    return true;
                }
            },
            {
                question: "Highest degree? (e.g., BS Computer Science)",
                field: "education",
                onComplete: function(val) { resumeData.education.push({degree: val, school: "", date: ""}); }
            },
            {
                question: "University name?",
                onComplete: function(val) { resumeData.education[resumeData.education.length-1].school = val; }
            },
            {
                question: "Graduation year?",
                onComplete: function(val) { resumeData.education[resumeData.education.length-1].date = val; }
            },
            {
                question: "List your skills (comma separated):",
                field: "skills",
                suggestions: ["JavaScript, React, Node.js", "Project Management, Leadership", "SEO, Google Analytics, Content Strategy"]
            }
        ];

        function showStep(index) {
            try {
                if (index >= steps.length) {
                    finishResume();
                    return;
                }

                currentStep = index;
                const step = steps[index];
                const chatBox = document.getElementById('chatBox');

                // Add bot message
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message bot-msg';
                msgDiv.innerHTML = step.question;
                chatBox.appendChild(msgDiv);

                // Add suggestions if any
                if (step.suggestions) {
                    const sugDiv = document.createElement('div');
                    sugDiv.className = 'message bot-msg';
                    sugDiv.style.background = '#e3f2fd';
                    sugDiv.style.border = '1px solid #90caf9';

                    let html = '<strong>Suggestions:</strong><br>';
                    step.suggestions.forEach(s => {
                        html += `<button class="suggestion-btn" onclick="useSuggestion('${s.replace(/'/g, "\\'")}')">${s}</button>`;
                    });
                    sugDiv.innerHTML = html;
                    chatBox.appendChild(sugDiv);
                }

                if (step.options) {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'message bot-msg';
                    optDiv.style.background = '#f5f5f5';

                    let html = '<strong>Choose:</strong><br>';
                    step.options.forEach(o => {
                        html += `<button class="suggestion-btn" onclick="useSuggestion('${o.replace(/'/g, "\\'")}')">${o}</button>`;
                    });
                    optDiv.innerHTML = html;
                    chatBox.appendChild(optDiv);
                }

                chatBox.scrollTop = chatBox.scrollHeight;

                // Update input placeholder
                document.getElementById('msgInput').placeholder = step.isParagraph ? "Type your response (multiple lines allowed)..." : "Type here...";

            } catch (e) {
                showError("Show step error: " + e.message);
            }
        }

        function useSuggestion(text) {
            document.getElementById('msgInput').value = text;
            sendMessage();
        }

        function sendMessage() {
            try {
                const input = document.getElementById('msgInput');
                const text = input.value.trim();
                if (!text) return;

                // Add user message
                const chatBox = document.getElementById('chatBox');
                const userDiv = document.createElement('div');
                userDiv.className = 'message user-msg';
                userDiv.innerHTML = text.replace(/\n/g, '<br>');
                chatBox.appendChild(userDiv);
                chatBox.scrollTop = chatBox.scrollHeight;

                input.value = '';
                input.style.height = 'auto';

                // Process step
                const step = steps[currentStep];

                if (step.field && step.field !== "exp_title" && step.field !== "education") {
                    if (step.field === "skills") {
                        resumeData.skills = text.split(',').map(s => s.trim()).filter(s => s);
                    } else {
                        resumeData[step.field] = text;
                    }
                }

                if (step.onComplete) step.onComplete(text);

                let shouldAdvance = true;
                if (step.handler) shouldAdvance = step.handler(text);

                if (shouldAdvance) {
                    setTimeout(() => showStep(currentStep + 1), 500);
                }

                updatePreview();
                updateScore();

            } catch (e) {
                showError("Send error: " + e.message);
            }
        }

        function goBack() {
            if (currentStep > 0) {
                currentStep--;
                showStep(currentStep);
            }
        }

        function updatePreview() {
            try {
                const d = resumeData;
                const view = document.getElementById('resumeView');

                if (!d.name) {
                    view.innerHTML = '<div style="text-align: center; color: #999; padding-top: 100px;">Your resume will appear here</div>';
                    return;
                }

                let html = `
                    <div style="border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px;">
                        <h1 style="font-size: 24px; margin: 0; text-transform: uppercase;">${d.name}</h1>
                        <p style="margin: 5px 0 0 0; font-size: 14px;">
                            ${d.email || ''} ${d.phone ? '• ' + d.phone : ''} ${d.location ? '• ' + d.location : ''}
                        </p>
                    </div>
                `;

                if (d.summary) {
                    html += `<div style="margin-bottom: 15px;">
                        <h3 style="border-bottom: 1px solid #000; font-size: 14px; text-transform: uppercase; margin-bottom: 8px;">Professional Summary</h3>
                        <p style="font-size: 13px; line-height: 1.4;">${d.summary.replace(/\n/g, '<br>')}</p>
                    </div>`;
                }

                if (d.experience.length > 0) {
                    html += `<div style="margin-bottom: 15px;">
                        <h3 style="border-bottom: 1px solid #000; font-size: 14px; text-transform: uppercase; margin-bottom: 8px;">Experience</h3>`;
                    d.experience.forEach(exp => {
                        html += `<div style="margin-bottom: 10px;">
                            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 13px;">
                                <span>${exp.title}</span>
                                <span style="font-weight: normal; font-style: italic;">${exp.date}</span>
                            </div>
                            <div style="font-style: italic; font-size: 12px; color: #555;">${exp.company}</div>
                            <p style="font-size: 12px; margin: 3px 0 0 0;">${exp.desc ? exp.desc.replace(/\n/g, '<br>') : ''}</p>
                        </div>`;
                    });
                    html += `</div>`;
                }

                if (d.education.length > 0) {
                    html += `<div style="margin-bottom: 15px;">
                        <h3 style="border-bottom: 1px solid #000; font-size: 14px; text-transform: uppercase; margin-bottom: 8px;">Education</h3>`;
                    d.education.forEach(edu => {
                        html += `<div style="margin-bottom: 8px;">
                            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 13px;">
                                <span>${edu.degree}</span>
                                <span style="font-weight: normal; font-style: italic;">${edu.date}</span>
                            </div>
                            <div style="font-style: italic; font-size: 12px; color: #555;">${edu.school}</div>
                        </div>`;
                    });
                    html += `</div>`;
                }

                if (d.skills.length > 0) {
                    html += `<div>
                        <h3 style="border-bottom: 1px solid #000; font-size: 14px; text-transform: uppercase; margin-bottom: 8px;">Skills</h3>
                        <p style="font-size: 12px;">${d.skills.join(' • ')}</p>
                    </div>`;
                }

                view.innerHTML = html;

            } catch (e) {
                showError("Preview error: " + e.message);
            }
        }

        function updateScore() {
            let score = 0;
            if (resumeData.name) score += 15;
            if (resumeData.email && resumeData.phone) score += 15;
            if (resumeData.summary) score += 20;
            if (resumeData.experience.length > 0) score += 30;
            if (resumeData.education.length > 0) score += 10;
            if (resumeData.skills.length > 0) score += 10;

            document.getElementById('scoreDisplay').textContent = score;
            document.documentElement.style.setProperty('--score', score);
        }

        function finishResume() {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'message bot-msg';
            div.innerHTML = `<strong>🎉 Resume Complete!</strong><br>Your ATS Score: ${document.getElementById('scoreDisplay').textContent}/100<br><br><button class="suggestion-btn" onclick="alert('PDF Download would start here')">Download PDF</button>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Safety check on load
        window.onload = function() {
            console.log("Page loaded successfully");
            console.log("Start button exists:", !!document.getElementById('startBtn'));
        };
    </script>
</body>
</html>
