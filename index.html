<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body { background: #f5f7fa; height: 100vh; overflow: hidden; }

        /* Welcome Screen */
        #welcomeScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        .welcome-box {
            background: rgba(255,255,255,0.15);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 600px;
        }

        .welcome-box h1 { margin-bottom: 20px; font-size: 36px; }
        .welcome-box p { margin-bottom: 30px; font-size: 18px; opacity: 0.9; }

        #startBtn {
            padding: 15px 50px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #startBtn:hover { transform: scale(1.05); }

        /* Main App */
        #mainApp {
            display: none;
            height: 100vh;
            width: 100%;
        }

        #mainApp.visible { display: flex; }

        .left-panel {
            width: 40%;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 { font-size: 20px; }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            max-width: 85%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message { align-self: flex-start; }
        .user-message {
            align-self: flex-end;
            margin-left: auto;
        }

        .message-bubble {
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .bot-message .message-bubble {
            background: white;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .user-message .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* Suggestions Styling - Multiple visible */
        .suggestions-container {
            margin-top: 10px;
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .suggestions-title {
            font-size: 13px;
            font-weight: 700;
            color: #1565c0;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .suggestion-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .suggestion-item {
            background: white;
            border: 2px solid #90caf9;
            color: #1565c0;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
            transition: all 0.2s;
            line-height: 1.4;
        }

        .suggestion-item:hover {
            background: #667eea;
            border-color: #667eea;
            color: white;
            transform: translateX(5px);
        }

        .suggestion-item.full-sentence {
            font-size: 13px;
            padding: 15px;
            line-height: 1.5;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: white;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #msgInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            resize: none;
            min-height: 50px;
            font-family: inherit;
        }

        #msgInput:focus { border-color: #667eea; }

        #sendBtn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        #sendBtn:hover { background: #5568d3; }

        /* Right Panel */
        .right-panel {
            flex: 1;
            background: #eef2f7;
            padding: 20px;
            overflow-y: auto;
        }

        .score-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .score-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: conic-gradient(#4caf50 calc(var(--score, 0) * 1%), #e0e0e0 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-weight: bold;
            font-size: 20px;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 50%;
        }

        #scoreValue { position: relative; z-index: 1; color: #333; }

        .resume-preview {
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            font-family: 'Calibri', 'Arial', sans-serif;
            font-size: 11pt;
            line-height: 1.4;
        }

        .section { margin-bottom: 15pt; }
        .section-title {
            font-size: 12pt;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1pt solid #000;
            margin-bottom: 6pt;
            padding-bottom: 3pt;
        }
    </style>
</head>
<body>

    <!-- Welcome Screen -->
    <div id="welcomeScreen">
        <div class="welcome-box">
            <h1>📝 Smart Resume Builder</h1>
            <p>Create an ATS-optimized resume with AI-powered suggestions for every section</p>
            <button id="startBtn" onclick="startBuilding()">Start Building →</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp">
        <div class="left-panel">
            <div class="header">
                <h2>💬 Resume Assistant</h2>
                <button class="back-btn" onclick="goBack()" id="backBtn" style="display: none;">← Back</button>
            </div>

            <div class="chat-area" id="chatBox"></div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="msgInput" rows="1" placeholder="Type your answer here..."></textarea>
                    <button id="sendBtn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="score-card">
                <div class="score-circle" id="scoreCircle">
                    <span id="scoreValue">0</span>
                </div>
                <div>
                    <h3 style="margin: 0; color: #333;">ATS Compatibility Score</h3>
                    <p style="margin: 5px 0 0 0; color: #666; font-size: 14px;" id="scoreText">Complete sections to improve score</p>
                </div>
            </div>

            <div class="resume-preview" id="resumeView">
                <div style="text-align: center; color: #999; padding-top: 100px; font-size: 16px;">
                    Your resume preview will appear here
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentStep = 0;
        let history = [];
        let resumeData = {
            targetRole: '',
            name: '', title: '', email: '', phone: '', location: '',
            summary: '', experience: [], education: [], skills: []
        };
        let currentExp = null;
        let currentEdu = null;

        // Multiple suggestions for EVERY section
        const allSteps = [
            {
                id: 'role',
                question: "What job title are you targeting? This helps me suggest relevant keywords.",
                suggestions: [
                    "Software Engineer",
                    "Marketing Manager",
                    "Product Manager",
                    "Sales Representative",
                    "Data Analyst",
                    "Project Manager"
                ]
            },
            {
                id: 'name',
                question: "What's your full name? (As it appears on official documents)",
                suggestions: [
                    "John Smith",
                    "Sarah Johnson",
                    "Michael Chen",
                    "Emily Rodriguez"
                ]
            },
            {
                id: 'title',
                question: "What professional title should appear on your resume?",
                suggestions: [
                    "Senior Software Engineer",
                    "Marketing Director",
                    "Product Manager",
                    "Sales Executive",
                    "Full Stack Developer"
                ]
            },
            {
                id: 'email',
                question: "What's your professional email address?",
                suggestions: [
                    "john.smith@email.com",
                    "firstname.lastname@company.com",
                    "jsmith.professional@gmail.com"
                ]
            },
            {
                id: 'phone',
                question: "What's your phone number with area code?",
                suggestions: [
                    "(555) 123-4567",
                    "(555) 987-6543",
                    "(555) 456-7890"
                ]
            },
            {
                id: 'location',
                question: "What's your current location? (City, State or 'Remote')",
                suggestions: [
                    "New York, NY",
                    "San Francisco, CA",
                    "Austin, TX",
                    "Chicago, IL",
                    "Remote"
                ]
            },
            {
                id: 'summary',
                question: "Write a professional summary (2-3 sentences). Click any template below to use it, or write your own:",
                isParagraph: true,
                suggestions: [
                    "Results-driven Software Engineer with 5+ years of experience designing scalable applications and implementing efficient solutions. Proficient in modern frameworks and cloud architecture with a proven track record of delivering high-quality code on time.",
                    "Innovative Marketing Manager with 6+ years of experience developing data-driven campaigns that increased revenue by 40%. Expert in digital strategy, SEO/SEM, and brand management with strong analytical and creative skills.",
                    "Detail-oriented Product Manager with expertise in Agile methodologies and cross-functional team leadership. Proven ability to translate business requirements into technical solutions and deliver products that exceed user expectations.",
                    "Dynamic Sales Representative with consistent record of exceeding quota by 150%. Expert in B2B sales, relationship building, and consultative selling with strong negotiation and closing skills."
                ]
            },
            {
                id: 'exp1_title',
                question: "Let's add your work experience. What's your most recent job title?",
                suggestions: [
                    "Software Engineer",
                    "Senior Developer",
                    "Marketing Specialist",
                    "Sales Associate",
                    "Project Coordinator"
                ]
            },
            {
                id: 'exp1_company',
                question: "What company did you work for?",
                suggestions: [
                    "Tech Solutions Inc.",
                    "Global Marketing Group",
                    "Innovation Labs",
                    "Enterprise Solutions Ltd."
                ]
            },
            {
                id: 'exp1_date',
                question: "What were the dates? (Format: Jan 2020 - Present)",
                suggestions: [
                    "Jan 2020 - Present",
                    "June 2018 - Dec 2022",
                    "March 2019 - August 2023",
                    "2017 - 2023"
                ]
            },
            {
                id: 'exp1_desc',
                question: "Describe your key achievements. Use action verbs and numbers! Click a suggestion or write your own:",
                isParagraph: true,
                suggestions: [
                    "Led a team of 5 developers to redesign the company website, resulting in 40% faster load times and 25% increase in user engagement.",
                    "Implemented automated testing protocols that reduced bug reports by 60% and improved deployment frequency by 3x.",
                    "Managed marketing campaigns with $500K budget, achieving 150% ROI and increasing qualified leads by 45%.",
                    "Developed and launched new product feature that generated $2M in revenue within first 6 months of release."
                ]
            },
            {
                id: 'exp_more',
                question: "Do you want to add another position?",
                options: ["Yes, add another job", "No, continue to education"]
            },
            {
                id: 'exp2_title',
                question: "Previous job title?",
                suggestions: [
                    "Junior Developer",
                    "Marketing Coordinator",
                    "Sales Representative",
                    "Assistant Manager"
                ]
            },
            {
                id: 'exp2_company',
                question: "Company name?",
                suggestions: [
                    "Previous Company Inc.",
                    "StartUp Ventures",
                    "Digital Agency Co."
                ]
            },
            {
                id: 'exp2_date',
                question: "Dates for this position?",
                suggestions: [
                    "2017 - 2020",
                    "June 2016 - Dec 2019",
                    "Jan 2015 - May 2018"
                ]
            },
            {
                id: 'exp2_desc',
                question: "Describe your responsibilities and achievements:",
                isParagraph: true,
                suggestions: [
                    "Collaborated with cross-functional teams to deliver projects on time and under budget.",
                    "Maintained 99% customer satisfaction rating while handling 50+ support tickets daily.",
                    "Created content strategy that increased social media engagement by 200%."
                ]
            },
            {
                id: 'edu_degree',
                question: "What's your highest degree? (e.g., Bachelor of Science in Computer Science)",
                suggestions: [
                    "BS Computer Science",
                    "BA Marketing",
                    "MBA Business Administration",
                    "BS Data Analytics",
                    "BA Communications"
                ]
            },
            {
                id: 'edu_school',
                question: "Which university or institution?",
                suggestions: [
                    "State University",
                    "Tech Institute",
                    "Business School",
                    "Online University"
                ]
            },
            {
                id: 'edu_date',
                question: "Graduation year?",
                suggestions: [
                    "2020",
                    "2018",
                    "2016",
                    "2022"
                ]
            },
            {
                id: 'edu_more',
                question: "Add another degree or certification?",
                options: ["Yes, add more education", "No, continue to skills"]
            },
            {
                id: 'skills',
                question: "List your key skills (comma separated). Here are suggestions for your industry:",
                suggestions: [
                    "JavaScript, React, Node.js, Python, SQL, Git, AWS",
                    "Project Management, Agile, Scrum, Leadership, Communication",
                    "SEO, Google Analytics, Content Strategy, Social Media, Email Marketing",
                    "Salesforce, CRM, B2B Sales, Negotiation, Account Management"
                ]
            }
        ];

        // Start function
        function startBuilding() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('mainApp').classList.add('visible');

            // Setup textarea
            const textarea = document.getElementById('msgInput');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            textarea.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            showStep(0);
        }

        function showStep(index) {
            if (index >= allSteps.length) {
                finishResume();
                return;
            }

            currentStep = index;
            const step = allSteps[index];
            const chatBox = document.getElementById('chatBox');

            // Add bot question
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot-message';
            msgDiv.innerHTML = `<div class="message-bubble"><strong>Step ${index + 1} of ${allSteps.length}</strong><br><br>${step.question}</div>`;
            chatBox.appendChild(msgDiv);

            // Add suggestions if available
            if (step.suggestions && step.suggestions.length > 0) {
                const sugDiv = document.createElement('div');
                sugDiv.className = 'message bot-message';

                let html = `<div class="suggestions-container">
                    <div class="suggestions-title">💡 Click any suggestion to use it:</div>
                    <div class="suggestion-list">`;

                step.suggestions.forEach(s => {
                    // Escape quotes for onclick
                    const safeText = s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const className = step.isParagraph ? 'suggestion-item full-sentence' : 'suggestion-item';
                    html += `<button class="${className}" onclick="useSuggestion('${safeText}')">${s}</button>`;
                });

                html += `</div></div>`;
                sugDiv.innerHTML = html;
                chatBox.appendChild(sugDiv);
            }

            // Add options if available (Yes/No, etc.)
            if (step.options && step.options.length > 0) {
                const optDiv = document.createElement('div');
                optDiv.className = 'message bot-message';

                let html = `<div class="suggestions-container" style="background: #f3e5f5; border-color: #ce93d8;">
                    <div class="suggestions-title" style="color: #7b1fa2;">Choose an option:</div>
                    <div class="suggestion-list">`;

                step.options.forEach(opt => {
                    const safeText = opt.replace(/'/g, "\\'");
                    html += `<button class="suggestion-item" style="border-color: #ce93d8; color: #7b1fa2;" onclick="useSuggestion('${safeText}')">${opt}</button>`;
                });

                html += `</div></div>`;
                optDiv.innerHTML = html;
                chatBox.appendChild(optDiv);
            }

            chatBox.scrollTop = chatBox.scrollHeight;

            // Show/hide back button
            document.getElementById('backBtn').style.display = history.length > 0 ? 'block' : 'none';

            // Update placeholder
            const input = document.getElementById('msgInput');
            input.placeholder = step.isParagraph ? "Type your answer (multiple lines allowed)..." : "Type your answer...";
            input.focus();
        }

        function useSuggestion(text) {
            document.getElementById('msgInput').value = text;
            // Auto-resize
            const textarea = document.getElementById('msgInput');
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            const chatBox = document.getElementById('chatBox');

            // Add user message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.innerHTML = `<div class="message-bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(userDiv);

            input.value = '';
            input.style.height = 'auto';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Process data
            const step = allSteps[currentStep];

            // Store data based on step ID
            switch(step.id) {
                case 'role': resumeData.targetRole = text; break;
                case 'name': resumeData.name = text; break;
                case 'title': resumeData.title = text; break;
                case 'email': resumeData.email = text; break;
                case 'phone': resumeData.phone = text; break;
                case 'location': resumeData.location = text; break;
                case 'summary': resumeData.summary = text; break;
                case 'exp1_title': currentExp = {title: text, company: '', date: '', desc: ''}; break;
                case 'exp1_company': currentExp.company = text; break;
                case 'exp1_date': currentExp.date = text; break;
                case 'exp1_desc':
                    currentExp.desc = text;
                    resumeData.experience.push({...currentExp});
                    break;
                case 'exp2_title': currentExp = {title: text, company: '', date: '', desc: ''}; break;
                case 'exp2_company': currentExp.company = text; break;
                case 'exp2_date': currentExp.date = text; break;
                case 'exp2_desc':
                    currentExp.desc = text;
                    resumeData.experience.push({...currentExp});
                    break;
                case 'edu_degree': currentEdu = {degree: text, school: '', date: ''}; break;
                case 'edu_school': currentEdu.school = text; break;
                case 'edu_date':
                    currentEdu.date = text;
                    resumeData.education.push({...currentEdu});
                    break;
                case 'skills':
                    resumeData.skills = text.split(',').map(s => s.trim()).filter(s => s);
                    break;
            }

            // Handle special cases
            let nextStep = currentStep + 1;

            if (step.id === 'exp_more') {
                if (text.includes('Yes')) {
                    nextStep = currentStep + 1; // Go to exp2
                } else {
                    nextStep = currentStep + 5; // Skip to education
                }
            } else if (step.id === 'edu_more') {
                if (text.includes('Yes')) {
                    // Would need more education steps, for now just continue
                    nextStep = currentStep + 1;
                } else {
                    nextStep = currentStep + 1; // Go to skills
                }
            }

            history.push(currentStep);

            setTimeout(() => {
                showStep(nextStep);
                updatePreview();
                updateScore();
            }, 500);
        }

        function goBack() {
            if (history.length > 0) {
                const prev = history.pop();
                showStep(prev);
            }
        }

        function updatePreview() {
            const d = resumeData;
            const view = document.getElementById('resumeView');

            if (!d.name) {
                view.innerHTML = '<div style="text-align: center; color: #999; padding-top: 100px; font-size: 16px;">Your resume preview will appear here</div>';
                return;
            }

            let html = `
                <div style="border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px;">
                    <div style="font-size: 24px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;">${d.name}</div>
                    <div style="font-size: 14px; color: #333;">
                        ${d.email || ''} ${d.phone ? '• ' + d.phone : ''} ${d.location ? '• ' + d.location : ''}
                    </div>
                </div>
            `;

            if (d.summary) {
                html += `<div class="section">
                    <div class="section-title">Professional Summary</div>
                    <div style="font-size: 11pt; line-height: 1.4;">${d.summary.replace(/\n/g, '<br>')}</div>
                </div>`;
            }

            if (d.experience.length > 0) {
                html += `<div class="section">
                    <div class="section-title">Professional Experience</div>`;
                d.experience.forEach(exp => {
                    html += `<div style="margin-bottom: 12px;">
                        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 12pt;">
                            <span>${exp.title}</span>
                            <span style="font-weight: normal; font-style: italic; font-size: 11pt;">${exp.date}</span>
                        </div>
                        <div style="font-style: italic; color: #555; font-size: 11pt; margin-bottom: 4px;">${exp.company}</div>
                        <div style="font-size: 11pt;">${exp.desc ? exp.desc.replace(/\n/g, '<br>') : ''}</div>
                    </div>`;
                });
                html += `</div>`;
            }

            if (d.education.length > 0) {
                html += `<div class="section">
                    <div class="section-title">Education</div>`;
                d.education.forEach(edu => {
                    html += `<div style="margin-bottom: 8px;">
                        <div style="display: flex; justify-content: space-between; font-weight: bold;">
                            <span>${edu.degree}</span>
                            <span style="font-weight: normal; font-style: italic;">${edu.date}</span>
                        </div>
                        <div style="font-style: italic; color: #555;">${edu.school}</div>
                    </div>`;
                });
                html += `</div>`;
            }

            if (d.skills.length > 0) {
                html += `<div class="section">
                    <div class="section-title">Skills</div>
                    <div style="font-size: 11pt;">${d.skills.join(' • ')}</div>
                </div>`;
            }

            view.innerHTML = html;
        }

        function updateScore() {
            let score = 0;
            if (resumeData.name) score += 15;
            if (resumeData.email && resumeData.phone) score += 15;
            if (resumeData.summary) score += 20;
            if (resumeData.experience.length > 0) score += 30;
            if (resumeData.education.length > 0) score += 10;
            if (resumeData.skills.length > 0) score += 10;

            document.getElementById('scoreValue').textContent = score;
            document.documentElement.style.setProperty('--score', score);

            const text = score < 50 ? 'Keep going...' : score < 80 ? 'Good progress!' : 'Excellent!';
            document.getElementById('scoreText').textContent = text;
        }

        function finishResume() {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = 'message bot-message';
            div.innerHTML = `<div class="message-bubble" style="background: #e8f5e9; border-color: #81c784;">
                <strong>🎉 Resume Complete!</strong><br><br>
                Your ATS Score: <strong>${document.getElementById('scoreValue').textContent}/100</strong><br><br>
                <button onclick="downloadPDF()" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px;">Download PDF</button>
                <button onclick="downloadWord()" style="padding: 10px 20px; background: #fff; color: #667eea; border: 2px solid #667eea; border-radius: 6px; cursor: pointer;">Download Word</button>
            </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function downloadPDF() {
            alert('PDF download would start here (requires html2canvas library)');
        }

        function downloadWord() {
            alert('Word download would start here');
        }
    </script>
</body>
</html>
